services:
  app:
    image: ${FEASTOPS_IMAGE:-feastops-food-delivery-api:latest}
    container_name: feastops_app
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DEPLOYMENT_TARGET: docker-image
      APP_REPLICAS: "1"
      PUBLIC_APP_URL: http://localhost:3100
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feastops-app
  namespace: feastops
  labels:
    app.kubernetes.io/name: feastops-app
    app.kubernetes.io/part-of: feastops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feastops-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
